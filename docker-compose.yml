version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sccoo-db
    restart: always
    environment:
      POSTGRES_USER: sccoo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-please}
      POSTGRES_DB: sccoo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sccoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Web App
  app:
    build: .
    container_name: sccoo-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sccoo:${DB_PASSWORD:-change-me-please}@postgres:5432/sccoo
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://your-domain.com}
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    # Run db push then start
    command: >
      sh -c "
        cd packages/db && npx prisma db push --accept-data-loss && cd ../.. &&
        cd apps/web && npx next start -p 3000
      "

volumes:
  pgdata:
    driver: local
