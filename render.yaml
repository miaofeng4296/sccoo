services:
  - type: web
    name: sccoo
    runtime: node
    plan: free
    rootDir: .
    buildCommand: |
      npm install -g pnpm@9
      pnpm install --no-frozen-lockfile
      cd packages/db && npx prisma generate && cd ../..
      cd apps/web && npx next build && cd ../..
    startCommand: cd apps/web && npx next start -p $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sccoo-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://sccoo.onrender.com
      - key: NODE_VERSION
        value: 20.18.0

databases:
  - name: sccoo-db
    plan: free
