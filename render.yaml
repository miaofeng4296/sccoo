services:
  - type: web
    name: sccoo
    runtime: node
    plan: free
    buildCommand: |
      corepack enable
      pnpm install --no-frozen-lockfile
      cd packages/db && npx prisma generate && npx prisma db push --accept-data-loss && npx tsx prisma/seed.ts && cd ../..
      cd apps/web && NODE_OPTIONS="--max-old-space-size=384" npx next build && cd ../..
    startCommand: cd apps/web && npx next start -p $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sccoo-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://sccoo.onrender.com
      - key: NODE_VERSION
        value: 20.18.0

databases:
  - name: sccoo-db
    plan: free
