services:
  - type: web
    name: sccoo
    env: node
    plan: free
    buildCommand: |
      npm install -g pnpm
      pnpm install
      npx prisma generate --schema=packages/db/prisma/schema.prisma
      npx prisma db push --schema=packages/db/prisma/schema.prisma --accept-data-loss
      cd apps/web && npx next build
    startCommand: cd apps/web && npx next start -p $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sccoo-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://sccoo.onrender.com
      - key: NODE_VERSION
        value: 20.x

databases:
  - name: sccoo-db
    plan: free
